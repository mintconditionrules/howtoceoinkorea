<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Background -->
  <rect width="200" height="240" fill="#ffffff"/>

  <!-- Korean Peninsula outline -->
  <path d="M 80 20 Q 100 15 110 25 L 120 35 Q 125 45 128 55 L 130 70 Q 132 85 135 100 L 138 120 Q 140 140 138 160 L 135 175 Q 132 185 128 190 L 120 195 Q 110 200 100 205 L 90 200 Q 85 195 82 185 L 78 170 Q 75 150 73 130 L 70 110 Q 68 90 67 70 L 66 50 Q 67 35 70 25 Q 73 18 80 20 Z" fill="none" stroke="#000000" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Taegeuk (Korean flag symbol) in center -->
  <g transform="translate(100, 120)">
    <!-- White circle border -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#000000" stroke-width="1.5"/>

    <!-- Red half (top) -->
    <path d="M -35 0 A 35 35 0 0 1 35 0 A 17.5 17.5 0 0 1 0 17.5 A 17.5 17.5 0 0 0 -35 0 Z" fill="#c60c30"/>

    <!-- Blue half (bottom) -->
    <path d="M -35 0 A 17.5 17.5 0 0 1 0 -17.5 A 17.5 17.5 0 0 0 35 0 A 35 35 0 0 1 -35 0 Z" fill="#003478"/>
  </g>

  <!-- Jeju island -->
  <ellipse cx="75" cy="210" rx="4" ry="5" fill="none" stroke="#000000" stroke-width="1.5"/>
</svg>
